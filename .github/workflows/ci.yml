name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 安装Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: 安装依赖
        run: |
          python -m pip install --upgrade pip
          pip install pytest flake8

      - name: 代码风格检查
        run: flake8 . --ignore=E501,W503 --max-line-length=120 || true

      - name: 运行测试
        run: pytest || true
